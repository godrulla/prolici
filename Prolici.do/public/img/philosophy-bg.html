<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo de Filosofía</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000000, #333333);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .content {
            max-width: 80%;
        }
        
        h1 {
            font-size: 3vw;
            margin-bottom: 1vw;
        }
        
        p {
            font-size: 1.5vw;
            opacity: 0.8;
        }
        
        .quote {
            font-size: 2vw;
            font-style: italic;
            margin: 2vw 0;
            color: #00A651;
        }
    </style>
</head>
<body>
    <div class="placeholder">
        <div class="content">
            <h1>Fondo de Filosofía</h1>
            <p class="quote">"Hacemos realidad grandes ideas"</p>
            <p>1920 x 1080 px</p>
            <p>Esta imagen es un placeholder y debe ser reemplazada con una imagen real antes de la publicación del sitio web.</p>
        </div>
    </div>
</body>
</html>
